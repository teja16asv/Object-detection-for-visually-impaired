name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Cache Buildozer global directory
        uses: actions/cache@v2
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache Buildozer project directory
        uses: actions/cache@v2
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Setup Buildozer backend
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-setuptools build-essential libpython3-dev python3-pip zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake
          pip install --upgrade Cython buildozer

      - name: Ensure yolov8 weights
        run: |
          # Try downloading if missing
          if [ ! -f "yolov8n.pt" ]; then wget https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8n.pt; fi

      - name: Build with Buildozer
        run: |
          # Adjust max workers to avoid memory kill on github runners
          sed -i.bak "s/#p4a.jobs = 1/p4a.jobs = 2/g" buildozer.spec
          yes | buildozer -v android debug

      - name: Upload APK artifacat
        uses: actions/upload-artifact@v2
        with:
          name: Android-APK
          path: bin/*.apk
