name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Reverting slightly to avoid the forced PEP 668 on 24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-setuptools libpython3-dev zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake openjdk-17-jdk openjdk-17-jre

      - name: Install Buildozer via pipx (to bypass PEP 668)
        run: |
          pipx install buildozer
          pipx install cython

      - name: Ensure yolov8 weights
        run: |
          if [ ! -f "yolov8n.pt" ]; then wget https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8n.pt; fi

      - name: Build with Buildozer
        run: |
          sed -i.bak "s/#p4a.jobs = 1/p4a.jobs = 2/g" buildozer.spec
          yes | buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
